<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ Working Contact Form Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        h1::before {
            content: '✅ ';
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status.success::before {
            content: '✓';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 16px;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        .console {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            color: #0f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
        }
        .console-line {
            margin: 3px 0;
            line-height: 1.4;
        }
        .console-line.success {
            color: #0f0;
            font-weight: bold;
        }
        .console-line.error {
            color: #f00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Working Contact Form</h1>
        <p class="subtitle">
            🔄 Fresh version - No cache<br>
            📧 Sends to: nidigondaravindar@gmail.com<br>
            📱 Opens WhatsApp: +91 78936 39037
        </p>
        
        <form id="contactForm">
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" name="phone" placeholder="9876543210" required pattern="[0-9]{10}">
            </div>
            
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Product Interest</label>
                <select name="interest">
                    <option value="">Select a Category</option>
                    <option>Protein Powders</option>
                    <option>Vitamins & Supplements</option>
                    <option>Kids Nutrition</option>
                    <option>Weight Management</option>
                    <option>Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Your Message *</label>
                <textarea name="message" placeholder="Write your enquiry here..." required></textarea>
            </div>
            
            <button type="submit" id="submitBtn">Send Enquiry 🚀</button>
            
            <div id="status" class="status"></div>
        </form>
        
        <div class="console" id="console">
            <div class="console-line">📡 System ready. Waiting for form submission...</div>
        </div>
    </div>

    <script>
        // Console logging
        const consoleDiv = document.getElementById('console');
        
        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'console-line ' + type;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message);
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
        
        // Form submission handler
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            log('🚀 Form submission initiated', 'info');
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            submitBtn.textContent = '⏳ Sending...';
            submitBtn.disabled = true;
            showStatus('Sending your enquiry...', 'loading');
            
            // Get form data
            const formData = new FormData(this);
            
            // Add Web3Forms access key - YOUR VALID KEY
            formData.append('access_key', '24de3265-5fbc-4746-9d9a-c0bb2064ecc5');
            formData.append('subject', 'New Enquiry from NutriVeda Website');
            
            const formObject = Object.fromEntries(formData);
            log(`📝 Form data: ${JSON.stringify({
                name: formObject.name,
                phone: formObject.phone,
                email: formObject.email
            })}`, 'info');
            
            try {
                log('📤 Sending to Web3Forms API...', 'info');
                
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });
                
                log(`📥 Response received: HTTP ${response.status}`, 'info');
                
                const result = await response.json();
                log(`📦 Response data: ${JSON.stringify(result)}`, 'info');
                
                if (result.success) {
                    log('✅ SUCCESS! Email sent successfully!', 'success');
                    showStatus('Thank you for your interest in NutriVeda, we will be in touch.', 'success');
                    
                    // Send WhatsApp notification
                    const whatsappMsg = `🔔 *New Enquiry from NutriVeda*\n\n` +
                        `👤 Name: ${formObject.name}\n` +
                        `📞 Phone: ${formObject.phone}\n` +
                        `📧 Email: ${formObject.email}\n` +
                        `🛒 Interest: ${formObject.interest || 'Not specified'}\n` +
                        `💬 Message: ${formObject.message}`;
                    
                    const whatsappURL = `https://wa.me/917893639037?text=${encodeURIComponent(whatsappMsg)}`;
                    log('📱 Opening WhatsApp...', 'info');
                    window.open(whatsappURL, '_blank');
                    
                    submitBtn.textContent = '✅ Sent Successfully!';
                    submitBtn.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
                    
                    setTimeout(() => {
                        this.reset();
                        submitBtn.textContent = originalText;
                        submitBtn.style.background = '';
                        submitBtn.disabled = false;
                        log('🔄 Form reset. Ready for next submission.', 'info');
                    }, 3000);
                    
                } else {
                    throw new Error(result.message || 'Unknown error occurred');
                }
                
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, 'error');
                showStatus(`❌ Failed: ${error.message}. Call +91 78936 39037`, 'error');
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        log('✅ System initialized successfully', 'success');
        log('🌐 API Endpoint: https://api.web3forms.com/submit', 'info');
        log('📧 Destination: nidigondaravindar@gmail.com', 'info');
        log('📱 WhatsApp: +91 78936 39037', 'info');
        log('👉 Fill the form above and submit to test!', 'info');
    </script>
</body>
</html>
