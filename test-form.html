<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Test Contact Form - NutriVeda v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .console {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            color: #0f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .console-line {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Contact Form</h1>
        <p class="subtitle">This is a standalone test page with NO cache issues</p>
        
        <form id="testForm" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="24de3265-5fbc-4746-9d9a-c0bb2064ecc5">
            <input type="hidden" name="subject" value="Test Enquiry from NutriVeda">
            
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" name="userName" id="userName" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" name="userPhone" id="userPhone" placeholder="9876543210" required pattern="[0-9]{10}">
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="userEmail" id="userEmail" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Product Interest</label>
                <select name="productInterest" id="productInterest">
                    <option value="">Select a Category</option>
                    <option>Protein Powders</option>
                    <option>Vitamins & Supplements</option>
                    <option>Kids Nutrition</option>
                    <option>Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Message *</label>
                <textarea name="userMessage" id="userMessage" placeholder="Your enquiry..." required></textarea>
            </div>
            
            <button type="submit" id="submitBtn">Send Test Enquiry</button>
            
            <div id="status" class="status"></div>
        </form>
        
        <div class="console" id="console">
            <div class="console-line">Console output will appear here...</div>
        </div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'console-line';
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(message);
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }
        
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            log('Form submission started');
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            showStatus('Sending your test enquiry...', 'loading');
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            log(`Form data: ${JSON.stringify(data)}`);
            
            try {
                log(`Sending to: ${this.action}`);
                
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                log(`Response: ${JSON.stringify(result)}`);
                
                if (result.success) {
                    log('✓ Form submitted successfully!', 'success');
                    showStatus('✓ Test successful! Email sent to nidigondaravindar@gmail.com', 'success');
                    
                    // Send WhatsApp notification
                    const whatsappMsg = `🔔 Test Enquiry\n\nName: ${data.userName}\nPhone: ${data.userPhone}\nEmail: ${data.userEmail}\nMessage: ${data.userMessage}`;
                    const whatsappURL = `https://wa.me/917893639037?text=${encodeURIComponent(whatsappMsg)}`;
                    log('Opening WhatsApp...');
                    window.open(whatsappURL, '_blank');
                    
                    submitBtn.textContent = '✓ Sent Successfully!';
                    
                    setTimeout(() => {
                        this.reset();
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }, 3000);
                    
                } else {
                    log(`Error: ${result.message}`, 'error');
                    throw new Error(result.message || 'Form submission failed');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                showStatus(`Failed: ${error.message}`, 'error');
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        log('Test form loaded and ready');
        log('Web3Forms endpoint: https://api.web3forms.com/submit');
        log('Email will be sent to: nidigondaravindar@gmail.com');
        log('Fill the form and click submit to test');
    </script>
</body>
</html>
